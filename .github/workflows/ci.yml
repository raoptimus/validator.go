name: CI

on:
  push:
    paths-ignore:
      - 'doc/**'
      - '**.md'
    branches: [main]
    tags: [v*]
  pull_request:
    paths-ignore:
      - 'doc/**'
      - '**.md'

env:
  GO_VERSION: '1.25'
  GO_LINT_VERSION: 'v2.7.2'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: ${{ env.GO_LINT_VERSION }}

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: |
          mkdir -p .report
          go test -v -race -skip '^TestIntegration' -coverprofile=.report/coverage.out ./...

      - name: Create coverage badge
        uses: ncruces/go-coverage-report@v0
        with:
          coverage-file: .report/coverage.out
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
